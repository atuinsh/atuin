# zizmor configuration
# See: https://docs.zizmor.sh/configuration/

rules:
  # release.yml is autogenerated by cargo-dist (`dist generate`); hand-editing
  # it would be undone by the next regeneration, so its findings are
  # acknowledged here instead of being fixed in place.
  #
  # bats.yaml belongs to vendor/bash-preexec, which is vendored third-party
  # code that we don't maintain.
  excessive-permissions:
    ignore:
      - release.yml
      - bats.yaml
  template-injection:
    ignore:
      - release.yml
  unpinned-uses:
    ignore:
      - release.yml
      - bats.yaml
  unpinned-images:
    ignore:
      - release.yml
  artipacked:
    ignore:
      - bats.yaml
