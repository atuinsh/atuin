name: Trigger docs deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to atuinsh/docs
        run: gh api repos/atuinsh/docs/dispatches -f event_type=docs-updated
        env:
          GH_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
