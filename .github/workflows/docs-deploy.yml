name: Deploy docs (reusable)

# Shared implementation called by the trigger-specific workflows
# (docs-main.yml, docs-release.yml, docs-dispatch.yml). Not triggered directly.

on:
  workflow_call:
    inputs:
      version:
        description: >-
          Version to deploy. Empty = the main (unreleased) docs;
          X.Y.Z = a stable release (moves the `latest` alias + default);
          X.Y.Z-beta.N = a pre-release preview. A leading `v` is stripped.
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"

          if [ -n "$VERSION" ]; then
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Version '$VERSION' is not X.Y.Z - refusing to deploy." >&2
              exit 1
            fi

            if [[ "$VERSION" == *-* ]]; then
              # Prerelease: publish under its full version id, titled clearly.
              # Never latest, never default. Then prune older previews it
              # supersedes (older betas of this or an earlier line).
              echo "Deploying prerelease docs: $VERSION"
              uv run mike deploy --push --title "$VERSION (pre-release)" "$VERSION"
              STALE=$(uv run mike list --json | uv run python scripts/prerelease_docs.py "$VERSION" --exclude "$VERSION")
            else
              MINOR="${VERSION%.*}"
              echo "Deploying release docs: version=$MINOR alias=latest (from $VERSION)"
              uv run mike deploy --push --update-aliases "$MINOR" latest
              uv run mike set-default --push latest
              # Prune every prerelease preview whose base version is <= this
              # release (the corresponding release, or a later one, has landed).
              STALE=$(uv run mike list --json | uv run python scripts/prerelease_docs.py "$VERSION")
            fi

            if [ -n "$STALE" ]; then
              echo "Pruning superseded prerelease docs:" $STALE
              uv run mike delete --push $STALE
            fi
          else
            echo "Deploying main (unreleased) docs"
            uv run mike deploy --push --title "main (unreleased)" main
          fi

      - name: Ensure custom-domain CNAME on gh-pages
        # Runs at repo root, NOT the job-level `docs` working-directory, so the
        # worktree lands at <workspace>/gh-pages-wt.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # gh-pages may not exist on the very first deploy; nothing to guard.
          if ! git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages does not exist yet - skipping CNAME guard."
            exit 0
          fi
          git fetch origin gh-pages
          git worktree add gh-pages-wt gh-pages
          if [ ! -f gh-pages-wt/CNAME ]; then
            echo "docs.atuin.sh" > gh-pages-wt/CNAME
            git -C gh-pages-wt add CNAME
            git -C gh-pages-wt commit -m "chore(docs): ensure CNAME for custom domain"
            git -C gh-pages-wt push origin gh-pages
          fi
          git worktree remove gh-pages-wt
