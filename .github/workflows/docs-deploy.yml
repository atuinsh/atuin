name: Deploy docs to GitHub Pages

on:
  push:
    # NOTE: `paths` filters apply ONLY to the `branches` pushes, not to tag
    # pushes. A release tag deploys even though the version-bump commit may
    # not touch docs/**. Do not "simplify" by merging these filters.
    branches: [main]
    paths:
      - "docs/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Full release version to deploy as latest (e.g. 18.17.1). Leave blank to deploy the main version."
        required: false
        default: ""

permissions:
  contents: write

# Serialize all writes to the gh-pages branch so a main push and a tag
# release never race each other pushing to the same branch.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail

          # Decide what to deploy.
          #   - tag push          -> release path (version from tag)
          #   - workflow_dispatch with release_version -> release path
          #   - anything else (main push, blank dispatch) -> main version
          VERSION=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_VERSION" ]; then
            VERSION="$DISPATCH_VERSION"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            VERSION="${REF_NAME#v}"
          fi

          if [ -n "$VERSION" ]; then
            # Release path.
            # Guard against a malformed manual dispatch input (real cargo-dist
            # tags are always X.Y.Z, but the dispatch field is free text). The
            # prerelease suffix, if any, is allowed here and caught just below.
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Version '$VERSION' is not X.Y.Z - refusing to deploy." >&2
              exit 1
            fi
            if [[ "$VERSION" == *-* ]]; then
              echo "Prerelease ($VERSION) - skipping docs deploy."
              exit 0
            fi
            MINOR="${VERSION%.*}"
            echo "Deploying release docs: version=$MINOR alias=latest (from $VERSION)"
            uv run mike deploy --push --update-aliases "$MINOR" latest
            uv run mike set-default --push latest
          else
            # main path.
            echo "Deploying main (unreleased) docs"
            uv run mike deploy --push --title "main (unreleased)" main
          fi

      - name: Ensure custom-domain CNAME on gh-pages
        # Runs at repo root, NOT the job-level `docs` working-directory, so the
        # worktree lands at <workspace>/gh-pages-wt.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # gh-pages may not exist yet (e.g. the very first trigger is a
          # prerelease tag, whose deploy step skips without creating it).
          # No branch -> nothing to guard; exit cleanly.
          if ! git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages does not exist yet - skipping CNAME guard."
            exit 0
          fi
          git fetch origin gh-pages
          git worktree add gh-pages-wt gh-pages
          if [ ! -f gh-pages-wt/CNAME ]; then
            echo "docs.atuin.sh" > gh-pages-wt/CNAME
            git -C gh-pages-wt add CNAME
            git -C gh-pages-wt commit -m "chore(docs): ensure CNAME for custom domain"
            git -C gh-pages-wt push origin gh-pages
          fi
          git worktree remove gh-pages-wt
