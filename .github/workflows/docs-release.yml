name: Deploy release docs

# On any version tag: a stable vX.Y.Z deploys X.Y and moves `latest`;
# a prerelease vX.Y.Z-beta.N deploys a pre-release preview instead.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Shared with every docs deploy trigger so writes to the gh-pages branch are
# serialized across workflows (must match the group name in the other callers).
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  stable:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/docs-setup
      - uses: ./.github/actions/docs-deploy-stable
        with:
          version: ${{ github.ref_name }}
      - uses: ./.github/actions/docs-cname

  prerelease:
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/docs-setup
      - uses: ./.github/actions/docs-deploy-prerelease
        with:
          version: ${{ github.ref_name }}
      - uses: ./.github/actions/docs-cname
