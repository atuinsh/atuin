name: Vale

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/docs/**"
      - ".vale.ini"
      - ".vale/styles/config/**"
      - ".github/workflows/vale.yml"

# The gate is the job's exit code (fail_on_error), and the default
# github-pr-annotations reporter posts via workflow log commands, not the API.
permissions:
  contents: read
  # reviewdog fetches the PR diff unconditionally, before it consults
  # filter_mode. Read is sufficient; it never needs write.
  pull-requests: read

jobs:
  vale:
    name: Lint docs prose
    # Other workflows use depot-ubuntu-24.04. The action fetches a reviewdog
    # binary built for the stock GitHub runner image; switch only after
    # confirming it runs on depot.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: vale-cli/vale-action@v2.1.2
        with:
          version: "3.15.2"
          files: docs/docs
          # Gate the whole tree, not just added lines: the tree is clean, and
          # an edit that breaks a neighbouring line must not pass.
          filter_mode: nofilter
          fail_on_error: true
          level: error
          # reviewdog fails the job once 10 annotations of ANY severity are
          # reported to it, regardless of `level` or `fail_on_error` -- it has
          # no severity check on that path. .vale.ini's MinAlertLevel is
          # suggestion, so without this, warnings and suggestions alone push
          # us over 10 on nearly every PR. Restricting to errors here also
          # makes CI identical to the documented local command.
          vale_flags: "--minAlertLevel=error"
