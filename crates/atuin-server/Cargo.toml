[package]
name = "atuin-server"
edition = "2024"
description = "server library for atuin"

rust-version = { workspace = true }
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[lib]
name = "atuin_server"
path = "src/lib.rs"

[[bin]]
name = "atuin-server"
path = "src/bin/main.rs"

[dependencies]
atuin-common = { workspace = true }
atuin-server-database = { workspace = true }
atuin-server-postgres = { workspace = true }
atuin-server-sqlite = { workspace = true }

tracing = { workspace = true }
eyre = { workspace = true }
config = { workspace = true }
serde = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true }
axum = "0.8"
fs-err = { workspace = true }
tower = { workspace = true }
tower-http = { version = "0.6", features = ["trace"] }
reqwest = { workspace = true }
url = { workspace = true }
argon2 = "0.5"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
metrics = "0.24"
clap = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tempfile = "3"
# `util` enables `tower::ServiceExt::oneshot`, which drives the router without a socket.
tower = { workspace = true, features = ["util"] }
