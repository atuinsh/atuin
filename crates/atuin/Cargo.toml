[package]
name = "atuin"
edition = "2024"
description = "atuin - magical shell history"
readme = "./README.md"

rust-version = { workspace = true }
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
bin-dir = "{ name }-{ target }/{ bin }{ binary-ext }"
pkg-fmt = "tgz"

[package.metadata.deb]
maintainer = "Ellie Huxtable <ellie@elliehuxtable.com>"
copyright = "2021, Ellie Huxtable <ellie@elliehuxtable.com>"
license-file = ["LICENSE"]
depends = "$auto"
section = "utility"

[package.metadata.rpm]
package = "atuin"

[package.metadata.rpm.cargo]
buildflags = ["--release"]

[package.metadata.rpm.targets]
atuin = { path = "/usr/bin/atuin" }

[features]
default = ["client", "sync", "clipboard", "check-update", "daemon", "ai", "pty-proxy"]
client = ["atuin-client"]
sync = ["atuin-client/sync"]
daemon = ["atuin-client/daemon", "atuin-daemon"]
ai = ["atuin-ai"]
pty-proxy = ["dep:atuin-pty-proxy"]
hex = ["pty-proxy"]
clipboard = ["arboard"]
check-update = ["atuin-client/check-update"]

[dependencies]
atuin-ai = { path = "../atuin-ai", version = "18.16.0", optional = true, default-features = false }
atuin-client = { path = "../atuin-client", version = "18.16.0", optional = true, default-features = false }
atuin-common = { workspace = true }
atuin-dotfiles = { workspace = true }
atuin-history = { workspace = true }
atuin-daemon = { path = "../atuin-daemon", version = "18.16.0", optional = true, default-features = false }
atuin-pty-proxy = { path = "../atuin-pty-proxy", version = "18.16.0", optional = true, default-features = false }
atuin-scripts = { workspace = true }
atuin-kv = { workspace = true }

log = { workspace = true }
time = { workspace = true }
eyre = { workspace = true }
indicatif = "0.18.0"
serde = { workspace = true }
serde_json = { workspace = true }
crossterm = { workspace = true, features = ["use-dev-tty"] }
unicode-width = "0.2"
itertools = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
interim = { workspace = true }
clap = { workspace = true }
clap_complete = "4.5.8"
clap_complete_nushell = "4.5.4"
fs-err = { workspace = true }
fs4 = "0.13.1"
rpassword = "7.0"
semver = { workspace = true }
rustix = { workspace = true }
runtime-format = "0.1.3"
tiny-bip39 = "2"
futures-util = "0.3"
fuzzy-matcher = "0.3.7"
colored = "2.0.4"
open = "5"
ratatui = { workspace = true }
tracing = "0.1"
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"
uuid = { workspace = true }
sysinfo = "0.30.7"
regex = "1.10.5"
norm = { version = "0.1.1", features = ["fzf-v2"] }
atuin-nucleo-matcher = { workspace = true }
tempfile = { workspace = true }
shlex = "1.3.0"

# settings editor with comment and relative ordering preservation
toml_edit = { workspace = true }

[target.'cfg(any(target_os = "windows", target_os = "macos"))'.dependencies]
arboard = { version = "3.4", optional = true, default-features = false }

[target.'cfg(target_os = "linux")'.dependencies]
arboard = { version = "3.4", optional = true, default-features = false, features = [
    "wayland-data-control",
] }

[target.'cfg(unix)'.dependencies]
daemonize = "0.5.0"

# Enable tree-sitter shell parsing on platforms where tree-sitter's bundled C
# compiles cleanly. tree-sitter 0.26's portable/endian.h fails on illumos,
# Windows cross-compiles, and potentially other exotic targets.
[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
atuin-ai = { path = "../atuin-ai", version = "18.16.0", optional = true, default-features = false, features = ["tree-sitter"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_System_Console"] }

[dev-dependencies]
tracing-tree = "0.4"

# Integration tests in tests/ spin up a test server to verify sync functionality.
# TODO: Consider moving these tests to atuin-server crate instead (client would become a dev dep there)
atuin-server = { workspace = true }
atuin-server-database = { workspace = true }
atuin-server-postgres = { workspace = true }
