[package]
name = "atuin"
edition = "2024"
description = "atuin - magical shell history"
readme = "./README.md"

rust-version = { workspace = true }
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
bin-dir = "{ name }-{ target }/{ bin }{ binary-ext }"
pkg-fmt = "tgz"

[package.metadata.deb]
maintainer = "Ellie Huxtable <ellie@elliehuxtable.com>"
copyright = "2021, Ellie Huxtable <ellie@elliehuxtable.com>"
license-file = ["LICENSE"]
depends = "$auto"
section = "utility"

[package.metadata.rpm]
package = "atuin"

[package.metadata.rpm.cargo]
buildflags = ["--release"]

[package.metadata.rpm.targets]
atuin = { path = "/usr/bin/atuin" }

[features]
default = ["client", "sync", "clipboard", "check-update", "daemon"]
client = ["atuin-client"]
sync = ["atuin-client/sync"]
daemon = ["atuin-client/daemon", "atuin-daemon"]
clipboard = ["arboard"]
check-update = ["atuin-client/check-update"]

[dependencies]
atuin-client = { path = "../atuin-client", version = "18.13.0-beta.1", optional = true, default-features = false }
atuin-common = { path = "../atuin-common", version = "18.13.0-beta.1" }
atuin-dotfiles = { path = "../atuin-dotfiles", version = "18.13.0-beta.1" }
atuin-history = { path = "../atuin-history", version = "18.13.0-beta.1" }
atuin-daemon = { path = "../atuin-daemon", version = "18.13.0-beta.1", optional = true, default-features = false }
atuin-scripts = { path = "../atuin-scripts", version = "18.13.0-beta.1" }
atuin-kv = { path = "../atuin-kv", version = "18.13.0-beta.1" }

log = { workspace = true }
time = { workspace = true }
eyre = { workspace = true }
indicatif = "0.18.0"
serde = { workspace = true }
serde_json = { workspace = true }
crossterm = { workspace = true, features = ["use-dev-tty"] }
unicode-width = "0.2"
itertools = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
interim = { workspace = true }
clap = { workspace = true }
clap_complete = "4.5.8"
clap_complete_nushell = "4.5.4"
fs-err = { workspace = true }
fs4 = "0.13.1"
rpassword = "7.0"
semver = { workspace = true }
rustix = { workspace = true }
runtime-format = "0.1.3"
tiny-bip39 = "2"
futures-util = "0.3"
fuzzy-matcher = "0.3.7"
colored = "2.0.4"
open = "5"
ratatui = { workspace = true }
tracing = "0.1"
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"
uuid = { workspace = true }
sysinfo = "0.30.7"
regex = "1.10.5"
norm = { version = "0.1.1", features = ["fzf-v2"] }
nucleo-matcher = { git = "https://github.com/atuinsh/nucleo-ext.git", branch = "main" }
tempfile = { workspace = true }
shlex = "1.3.0"

[target.'cfg(any(target_os = "windows", target_os = "macos"))'.dependencies]
arboard = { version = "3.4", optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
arboard = { version = "3.4", optional = true, features = [
  "wayland-data-control",
] }

[target.'cfg(unix)'.dependencies]
daemonize = "0.5.0"

[dev-dependencies]
tracing-tree = "0.4"

# Integration tests in tests/ spin up a test server to verify sync functionality.
# TODO: Consider moving these tests to atuin-server crate instead (client would become a dev dep there)
atuin-server = { path = "../atuin-server", version = "18.13.0-beta.1" }
atuin-server-database = { path = "../atuin-server-database", version = "18.13.0-beta.1" }
atuin-server-postgres = { path = "../atuin-server-postgres", version = "18.13.0-beta.1" }
