# Vale (https://vale.sh) configuration for the Atuin docs.
#
# Package URLs are pinned to exact releases so an upstream style change cannot
# turn CI red without a commit here.
StylesPath = .vale/styles

MinAlertLevel = suggestion

Vocab = Atuin

Packages = https://github.com/errata-ai/Microsoft/releases/download/v0.14.2/Microsoft.zip, https://github.com/errata-ai/proselint/releases/download/v0.3.4/proselint.zip, https://github.com/errata-ai/alex/releases/download/v0.2.3/alex.zip, https://github.com/errata-ai/write-good/releases/download/v0.4.1/write-good.zip

[*.md]
BasedOnStyles = Vale, Microsoft, proselint, alex, write-good

# Bans every form of "to be" - unusable for technical writing.
write-good.E-Prime = NO
# Duplicate of Microsoft.Passive; keeping both doubles every hit.
write-good.Passive = NO
# Fires on "color", "hook", "execute", "failed". No true positives here.
alex.ProfanityUnlikely = NO
# Would require expanding CLI, TUI, SQL and API on first use on every page.
Microsoft.Acronyms = NO
# Microsoft's A-Z list prefers "back end"; "backend" is right for our audience.
Microsoft.Avoid = NO

# Real signal, too much of it to gate on. Reported, never blocking.
Microsoft.Passive = suggestion
Microsoft.SentenceLength = suggestion

# 23 of 30 hits are the Atuin team addressing the reader; removing "we"
# there forces passive voice or a nominalization.
Microsoft.We = NO
# Same reasoning as Microsoft.Acronyms: would expand AI, TUI, MCP, TLS and
# IDE in the headings readers scan and string-match against `atuin mcp`.
Microsoft.HeadingAcronyms = NO
# 14 of 15 hits are FAQ headings in the reader's own voice.
Microsoft.FirstPerson = NO
# Flags any -ly word, and its autofix inverts meaning: dropping
# "accidentally" from "prevents accidentally changing" reverses it.
Microsoft.Adverbs = NO
# All 8 hits are question headings; the "?" is a parsing cue.
Microsoft.HeadingPunctuation = NO
# 45 of 95 hits are literal identifiers -- `## fish`, `### dir`, `### level`
# -- where sentence-casing would contradict the CLI.
Microsoft.Headings = NO
# 20 of its 21 hits duplicate write-good.TooWordy at a lower severity.
Microsoft.Wordiness = NO
# Flags high-frequency hedges ("usually", "several") that carry real meaning.
write-good.Weasel = NO
# 70 of 82 hits are cognates and discourse connectives that L2 readers rely
# on. The dozen genuinely bureaucratic ones get fixed by hand.
write-good.TooWordy = suggestion
