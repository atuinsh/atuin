<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found - Atuin Docs</title>
  <link rel="icon" type="image/png" href="/latest/assets/atuin-turtle.png">
  <script>
    // Top-level sections of the pre-versioned docs site. Every known legacy
    // page has a static meta-refresh stub (see scripts/gen_legacy_stubs.py);
    // this JS hop is the net for anything unmapped. It lands on the
    // mkdocs-redirects stubs inside /latest/, which chain mapped stragglers
    // on to their new home.
    var LEGACY_PREFIXES = ["cli"];
    var first = window.location.pathname.split("/")[1];
    if (LEGACY_PREFIXES.indexOf(first) !== -1) {
      window.location.replace(
        "/latest" + window.location.pathname + window.location.search + window.location.hash
      );
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d0b;
      --text-1: #e8f0e9;
      --text-2: #8fa1a8;
      --text-3: #5a6870;
      --green: #38c85a;
      --font-body: "DM Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "Space Mono", "SFMono-Regular", Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.65;
      text-align: center;
    }

    /* The same hex tile atuin.sh uses -- the turtle's shell tessellation. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg width='108' height='186' viewBox='0 0 108 186' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54 0 108 31V93L54 124 0 93V31L54 0Z M54 124V186' fill='none' stroke='%2338c85a' stroke-width='1.35' stroke-linecap='square' stroke-linejoin='miter'/%3E%3C/svg%3E");
      background-position: center top;
      background-size: 108px 186px;
      mask-image: linear-gradient(to bottom, #000 0, transparent 88%);
      -webkit-mask-image: linear-gradient(to bottom, #000 0, transparent 88%);
    }

    main { position: relative; z-index: 1; max-width: 520px; }

    .logo { width: 132px; height: auto; margin-bottom: 40px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 20px;
      height: 1px;
      background: currentColor;
      opacity: 0.9;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 5vw, 40px);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p { margin: 0 auto 30px; max-width: 420px; color: var(--text-2); font-weight: 300; }

    .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .hex-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      min-width: 150px;
      padding: 0 20px;
      background: var(--green);
      color: #0a0d0b;
      clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0 50%);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: filter 160ms ease;
    }

    .hex-button:hover { filter: brightness(1.08); }

    .hex-button.secondary {
      background: rgba(56, 200, 90, 0.06);
      color: var(--text-1);
    }

    .hex-button.secondary::before {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border: 1px solid rgba(56, 200, 90, 0.34);
      clip-path: inherit;
    }

    .footnote { margin-top: 34px; margin-bottom: 0; color: var(--text-3); font-family: var(--font-mono); font-size: 12px; }
    .footnote a { color: var(--text-2); }
    .footnote a:hover { color: var(--green); }

    @media (max-width: 480px) {
      .actions { flex-direction: column; align-items: center; }
      .hex-button { width: 100%; max-width: 260px; }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/atuin-logo-horizontal.png" alt="Atuin">
    <div class="eyebrow">404 &mdash; Not Found</div>
    <h1>This page slipped out of history</h1>
    <p>
      Even Atuin can't recall this one. The page may have moved, or the link
      that brought you here may be out of date.
    </p>
    <div class="actions">
      <a class="hex-button" href="/">Latest docs</a>
      <a class="hex-button secondary" href="/latest/cli/">CLI docs</a>
    </div>
    <p class="footnote">
      Still stuck? Ask on the <a href="https://forum.atuin.sh">forum</a>
      or <a href="https://discord.gg/jR3tfchVvW">Discord</a>.
    </p>
  </main>
</body>
</html>
